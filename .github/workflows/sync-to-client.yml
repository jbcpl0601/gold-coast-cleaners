name: Mirror to Client Repo

on:
  push:
    branches:
      - main

jobs:
  mirror-git:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Verify Secret and Sync
        env:
          SYNC_TOKEN: ${{ secrets.CLIENT_REPO_TOKEN }}
        run: |
          # Diagnostic: Check if secret exists (won't print the actual token)
          if [ -z "$SYNC_TOKEN" ]; then
            echo "::error::Secret CLIENT_REPO_TOKEN is missing or empty in GitHub Settings!"
            exit 1
          fi

          git config --global user.email "bot@kinstel-solutions.com"
          git config --global user.name "Kinstel Sync Bot"
          
          # Use the 'oauth2' username format which is more stable for Fine-grained PATs
          git remote add client https://oauth2:$SYNC_TOKEN@github.com/jbcpl0601/gold-coast-cleaners.git
          
          # Force push to ensure it overwrites the client's empty repo
          git push client main --force
